# LooFinder - Render deployment config
# https://docs.render.com/blueprint-spec

services:
  - type: web
    name: loofinder
    runtime: node
    region: oregon

    buildCommand: cd backend && npm install && npm run build && npm run seed && cd ../frontend && npm install && npm run build && cp -r dist ../backend/public
    startCommand: cd backend && NODE_ENV=production npm start

    envVars:
      - key: NODE_ENV
        value: production
