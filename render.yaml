# LooFinder - Render deployment config
# https://docs.render.com/blueprint-spec

services:
  - type: web
    name: loofinder
    runtime: node
    region: oregon
    rootDir: .  # Use repo root so both backend and frontend are available at runtime

    buildCommand: rm -rf backend/node_modules/.cache frontend/node_modules/.vite frontend/dist 2>/dev/null; npm cache clean --force 2>/dev/null; cd backend && npm install && npm run build && npm run seed && cd ../frontend && npm install && npm run build && mkdir -p ../backend/public && cp -r dist/. ../backend/public/ && ls -la ../backend/public/
    startCommand: cd backend && NODE_ENV=production npm start

    envVars:
      - key: NODE_ENV
        value: production
